# ═══════════════════════════════════════════════════════
#  BALAJI PHOTO FRAMES — docker-compose.yml
#
#  Local dev:   docker-compose up
#  Production:  docker-compose -f docker-compose.yml up -d
#
#  ⚠️  .env file se secrets aate hain — kabhi yahan mat likho!
# ═══════════════════════════════════════════════════════

version: '3.8'

services:

  # ── Spring Boot Application ────────────────────────────
  app:
    build: .
    container_name: balaji-frames-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # All from .env file — NO hardcoding!
      APP_ENV:              ${APP_ENV:-prod}
      DB_URL:               ${DB_URL}
      DB_USERNAME:          ${DB_USERNAME}
      DB_PASSWORD:          ${DB_PASSWORD}
      RAZORPAY_KEY_ID:      ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET:  ${RAZORPAY_KEY_SECRET}
      ADMIN_USERNAME:       ${ADMIN_USERNAME}
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD}
      BUSINESS_UPI:         ${BUSINESS_UPI:-8765673141@apl}
      BUSINESS_PHONE:       ${BUSINESS_PHONE:-8299576949}
      UPLOAD_DIR:           /opt/balaji/uploads
    volumes:
      - uploads:/opt/balaji/uploads
      - logs:/opt/balaji/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - balaji-net

  # ── MySQL Database ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: balaji-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      balajiframes
      MYSQL_USER:          ${DB_USERNAME}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - balaji-net

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: balaji-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/opt/balaji/uploads:ro
    depends_on:
      - app
    networks:
      - balaji-net

volumes:
  mysql_data:
  uploads:
  logs:

networks:
  balaji-net:
    driver: bridge
