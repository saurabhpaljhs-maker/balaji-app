# ═══════════════════════════════════════════════════════════════
#  DEV Profile — Local Development
#  Active when: spring.profiles.active=dev  (default)
#
#  Secrets load hote hain .env file se (root folder mein)
#  .env file KABHI GitHub pe push mat karo!
# ═══════════════════════════════════════════════════════════════

# ── H2 In-Memory Database ─────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:balajidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (dev only): http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Upload Path (dev) ─────────────────────────────────────────
# Local machine pe temp folder use karo
app.upload.dir=${UPLOAD_DIR:/tmp/balaji-dev-uploads}

# ── Logging (verbose in dev) ──────────────────────────────────
logging.level.com.balaji=DEBUG
logging.level.org.springframework.web=INFO
