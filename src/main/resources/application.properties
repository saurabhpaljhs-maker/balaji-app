spring.application.name=balaji-frames
server.port=8080

# ── Active Profile ────────────────────────────────────────────
# dev  = H2 (local)  |  prod = MySQL (GCP)
# Override at runtime: java -jar app.jar --spring.profiles.active=prod
spring.profiles.active=dev

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload dir — overridden per profile (dev/prod)
# NEVER use src/main/resources/static/uploads in production!
# Production uses: /opt/balaji/uploads  (set via env var)
app.upload.dir=${UPLOAD_DIR:/tmp/balaji-uploads}

# ── Business Info ─────────────────────────────────────────────
app.business.name=BALAJI Photo Frames
app.business.phone=8299576949
app.business.upi=8765673141@apl
app.business.address=Rajpur, Shamshabad Road, Agra 282001

# ── Secrets from Environment Variables ───────────────────────
# Set these in .env (dev) or GCP VM environment (prod)
# NEVER hardcode here!
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder}
app.admin.username=${ADMIN_USERNAME:balaji_admin}
app.admin.password=${ADMIN_PASSWORD:ChangeMe@123}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.balaji=DEBUG
logging.level.org.springframework.security=WARN
