<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — BALAJI Photo Frames</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background:#1a0e08;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.login-card{
  background:#fff;border-radius:20px;
  width:100%;max-width:420px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.4);
}
.login-head{
  background:#2c1810;padding:40px 36px 32px;
  text-align:center;
}
.login-logo{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#C9A84C,#8B6914);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:900;font-size:26px;
  color:#2c1810;margin:0 auto 16px;
}
.login-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#C9A84C}
.login-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.login-body{padding:36px}
.alert-error{
  background:#fee2e2;color:#991b1b;
  padding:12px 16px;border-radius:8px;
  font-size:13px;margin-bottom:20px;
  border-left:4px solid #ef4444;
}
.alert-success{
  background:#dcfce7;color:#166534;
  padding:12px 16px;border-radius:8px;
  font-size:13px;margin-bottom:20px;
  border-left:4px solid #22c55e;
}
.form-group{margin-bottom:18px}
.form-label{
  display:block;font-size:11px;font-weight:700;
  color:#8B6E5A;text-transform:uppercase;
  letter-spacing:0.8px;margin-bottom:7px;
}
.form-input{
  width:100%;padding:13px 16px;
  border:1.5px solid #f0ebe0;border-radius:8px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:#2c1810;background:#faf6ee;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:#C9A84C;background:#fff}
.login-btn{
  width:100%;padding:15px;
  background:#C9A84C;color:#2c1810;
  border:none;border-radius:8px;
  font-family:'Playfair Display',serif;
  font-weight:700;font-size:16px;
  cursor:pointer;transition:opacity 0.2s;
  letter-spacing:0.3px;margin-top:8px;
}
.login-btn:hover{opacity:0.88}
.login-footer{
  text-align:center;margin-top:20px;
  font-size:12px;color:#8B6E5A;
}
.back-link{
  display:block;text-align:center;margin-top:12px;
  font-size:13px;color:#8B6E5A;text-decoration:none;
}
.back-link:hover{color:#C9A84C}
.lock-icon{font-size:12px;margin-right:4px}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-head">
    <div class="login-logo">B</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">BALAJI Photo Frames · Agra</div>
  </div>
  <div class="login-body">

    <!-- Error / Success Messages -->
    <div class="alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert-success" th:if="${logout}" th:text="${logout}"></div>
    <div class="alert-error" th:if="${param.blocked}"
         th:text="'Too many failed attempts. Try again in ' + ${param.minutes} + ' minutes.'"></div>
    <div class="alert-error" th:if="${param.denied}">
      Access denied. Please login with admin credentials.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Enter admin username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">🔐 Login to Admin Panel</button>
    </form>

    <div class="login-footer">
      <span class="lock-icon">🔒</span> Secured with Spring Security
    </div>
    <a href="/" class="back-link">← Back to BALAJI Photo Frames</a>
  </div>
</div>
</body>
</html>
