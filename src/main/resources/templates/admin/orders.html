<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Orders | BALAJI Photo Frames</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
body{background:#f5f0e8}
.admin-wrap{max-width:1200px;margin:0 auto;padding:32px 24px}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.admin-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid rgba(201,168,76,0.2);text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold-dark)}
.stat-label{font-size:12px;color:var(--brown-light);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.orders-table-wrap{background:#fff;border-radius:16px;border:1px solid rgba(201,168,76,0.2);overflow:hidden}
.orders-table{width:100%;border-collapse:collapse;font-size:13px}
.orders-table th{background:var(--brown);color:var(--gold);padding:14px 16px;text-align:left;white-space:nowrap}
.orders-table td{padding:14px 16px;border-bottom:1px solid rgba(201,168,76,0.08);vertical-align:middle}
.orders-table tbody tr:hover{background:rgba(201,168,76,0.04)}
.status-badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.status-PENDING    {background:#fef3c7;color:#92400e}
.status-CONFIRMED  {background:#dbeafe;color:#1e40af}
.status-IN_PROGRESS{background:#ede9fe;color:#5b21b6}
.status-READY      {background:#d1fae5;color:#065f46}
.status-DELIVERED  {background:#f0fdf4;color:#166534}
.status-CANCELLED  {background:#fee2e2;color:#991b1b}
.pay-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.pay-RAZORPAY{background:#3395ff22;color:#3395ff}
.pay-UPI  {background:#00b8d422;color:#0088aa}
.pay-CARD {background:#7c3aed22;color:#7c3aed}
.pay-CASH {background:#16a34a22;color:#16a34a}
select.status-select{padding:6px 10px;border-radius:6px;border:1px solid rgba(201,168,76,0.3);font-size:12px;background:#fff;cursor:pointer}
</style>
</head>
<body>
<header class="navbar">
  <div class="nav-inner">
    <div class="brand">
      <div class="brand-logo">B</div>
      <div>
        <div class="brand-name">BALAJI Frames — Admin</div>
        <div class="brand-sub">Order Management</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="/" style="color:rgba(255,255,255,0.6);font-size:13px">← Back to Site</a>
      <form action="/admin/logout" method="post" style="margin:0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit"
          style="background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);
                 color:var(--gold);padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer">
          🔓 Logout
        </button>
      </form>
    </div>
  </div>
</header>

<div class="admin-wrap">
  <div class="admin-header">
    <h1 class="admin-title">All Orders</h1>
    <span style="font-size:13px;color:var(--brown-light)" th:text="${orders.size()} + ' total orders'">0 orders</span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" th:text="${orders.size()}">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" th:text="${orders.stream().filter(o -> o.status.name() == 'PENDING').count()}">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" th:text="${orders.stream().filter(o -> o.status.name() == 'DELIVERED').count()}">0</div>
      <div class="stat-label">Delivered</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" th:text="'₹' + ${orders.stream().mapToDouble(o -> o.totalPrice.doubleValue()).sum().intValue()}">₹0</div>
      <div class="stat-label">Total Revenue</div>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="orders-table-wrap">
    <table class="orders-table">
      <thead>
        <tr>
          <th>#ID</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Frame</th>
          <th>Beading</th>
          <th>Cover</th>
          <th>Payment</th>
          <th>Total</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${orders.empty}">
          <td colspan="10" style="text-align:center;padding:40px;color:var(--brown-light)">No orders yet.</td>
        </tr>
        <tr th:each="o : ${orders}">
          <td><strong th:text="'#' + ${o.id}">—</strong></td>
          <td th:text="${o.customerName}">—</td>
          <td><a th:href="'tel:' + ${o.customerPhone}" th:text="${o.customerPhone}" style="color:var(--brown)">—</a></td>
          <td><strong th:text="${o.frameSize.displayLabel} + '&quot;'">—</strong></td>
          <td th:text="${o.beadingOption.widthLabel}">—</td>
          <td th:text="${o.coverOption.displayName}">—</td>
          <td>
            <span class="pay-badge" th:classappend="'pay-' + ${o.paymentMethod}" th:text="${o.paymentMethod}">UPI</span>
          </td>
          <td><strong style="color:var(--gold-dark)" th:text="'₹' + ${o.totalPrice}">₹0</strong></td>
          <td style="font-size:11px;color:var(--brown-light)"
              th:text="${#temporals.format(o.createdAt,'dd MMM, hh:mm a')}">—</td>
          <td>
            <select class="status-select"
                    th:onchange="|updateStatus(${o.id}, this.value)|">
              <option th:each="s : ${ {'PENDING','CONFIRMED','IN_PROGRESS','READY','DELIVERED','CANCELLED'} }"
                      th:value="${s}"
                      th:text="${s}"
                      th:selected="${s == o.status.name()}">
              </option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function updateStatus(orderId, status) {
  fetch(`/admin/orders/${orderId}/status`, {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: `status=${status}`
  })
  .then(r => r.json())
  .then(d => {
    const msg = document.createElement('div');
    msg.textContent = `Order #${orderId} → ${d.status}`;
    msg.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#2C1810;color:#C9A84C;padding:12px 20px;border-radius:8px;font-size:14px;z-index:999;border:1px solid #C9A84C';
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 2500);
  });
}
</script>
</body>
</html>
